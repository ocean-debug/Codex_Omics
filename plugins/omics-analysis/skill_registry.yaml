    schemas:
      input: "skills/single-cell-rna-qc/schemas/input.schema.json"
      output: "skills/single-cell-rna-qc/schemas/output.schema.json"
      run: "skills/single-cell-rna-qc/schemas/run.schema.json"
    outputs: ["with_qc.h5ad", "filtered.h5ad", "qc_summary.json", "qc plots", "run_manifest.json", "report.md"]
    approval:
      required_for_execution: true
      default_mode: "dry-run"
      approved_flag: "--approved true"
    reporting:
      manifest_required: true
      sections: ["Analysis Overview", "Input Data Summary", "Environment and Dependencies", "Methods and Parameters", "Results and QC Interpretation", "Warnings / Failures / Suggested Fixes", "Reproducibility Appendix"]
    examples: ["skills/single-cell-rna-qc/examples/minimal.json"]
    router_keywords: ["qc", "quality control", "h5ad", "10x", "mitochondrial", "filtering", "scrna"]
    workflow_diagram: "skills/single-cell-rna-qc/references/workflow.md"
  single-cell-preprocess:
    skill_id: "single-cell-preprocess"
    layer: "task"
    domain: "single_cell"
    backends: ["scanpy", "anndata"]

      check_environment: "skills/single-cell-preprocess/scripts/check_environment.py"
      validate_input: "skills/single-cell-preprocess/scripts/validate_input.py"
      plan: "skills/single-cell-preprocess/scripts/plan.py"
      run: "skills/single-cell-preprocess/scripts/run.py"
      summarize: "skills/single-cell-preprocess/scripts/summarize.py"
    schemas:
      input: "skills/single-cell-preprocess/schemas/input.schema.json"
      config: "skills/single-cell-preprocess/schemas/config.schema.json"
      output: "skills/single-cell-preprocess/schemas/output.schema.json"
      run: "skills/single-cell-preprocess/schemas/run.schema.json"
    outputs: ["preprocessed.h5ad", "preprocess_summary.json", "run_manifest.json", "report.md"]
    approval:
      required_for_execution: true
      default_mode: "dry-run"
      approved_flag: "--approved true"
    reporting:
      manifest_required: true
      sections: ["Analysis Overview", "Input Data Summary", "Environment and Dependencies", "Methods and Parameters", "Results and QC Interpretation", "Warnings / Failures / Suggested Fixes", "Reproducibility Appendix"]
    examples: ["skills/single-cell-preprocess/examples/demo_config.yaml", "skills/single-cell-preprocess/examples/expected_manifest.json"]

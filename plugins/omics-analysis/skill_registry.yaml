    maturity: "validated"
    tasks: ["model_recommendation", "validate_anndata", "train_scvi_model", "latent_embedding", "training_diagnostics"]
    input_formats: ["h5ad", "anndata"]
    constraints: ["dry_run_default", "approval_required", "no_dependency_install"]
    scripts:
      check_environment: "skills/scvi-tools/scripts/check_environment.py"
      list_models: "skills/scvi-tools/scripts/list_models.py"
      recommend_model: "skills/scvi-tools/scripts/recommend_model.py"
      validate_adata: "skills/scvi-tools/scripts/validate_adata.py"
      train: "skills/scvi-tools/scripts/train_model.py"
    schemas:
      input: "skills/scvi-tools/schemas/input.schema.json"
      output: "skills/scvi-tools/schemas/output.schema.json"
      run: "skills/scvi-tools/schemas/run.schema.json"
    outputs: ["model/", "adata_trained.h5ad", "scvi_model_summary.json", "diagnostics/", "run_manifest.json", "report.md"]
    approval:
      required_for_execution: true
      default_mode: "dry-run"
      approved_flag: "--approved true"
    reporting:
      manifest_required: true
      sections: ["Analysis Overview", "Input Data Summary", "Environment and Dependencies", "Methods and Parameters", "Results and QC Interpretation", "Warnings / Failures / Suggested Fixes", "Reproducibility Appendix"]
    examples: ["skills/scvi-tools/examples/minimal.json"]
    router_keywords: ["scvi", "scanvi", "totalvi", "peakvi", "multivi", "batch correction", "label transfer", "cite-seq", "multiome", "latent"]
    workflow_diagram: "skills/scvi-tools/references/workflow.md"

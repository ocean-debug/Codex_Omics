    layer: "system"
    domain: "reporting"
    backends: []
    composes: []
    public_entrypoint: true
    maturity: "validated"
    tasks: ["render_report", "summarize_manifest", "methods_text"]
    input_formats: ["run_manifest_json", "report_md"]
    constraints: ["read_only_inputs", "report_generation"]
    scripts:
      render_report: "skills/omics-report/scripts/render_report.py"
    schemas:
      input: "skills/omics-report/schemas/input.schema.json"
      output: "skills/omics-report/schemas/output.schema.json"
      run: "skills/omics-report/schemas/run.schema.json"
    outputs: ["report.md"]
    approval:
      required_for_execution: false
      default_mode: "render"
    reporting:
      manifest_required: false
      sections: ["Analysis Overview", "Input Data Summary", "Environment and Dependencies", "Methods and Parameters", "Results and QC Interpretation", "Warnings / Failures / Suggested Fixes", "Reproducibility Appendix"]
    examples: []
    router_keywords: ["report", "manifest", "methods", "summarize results", "interpret results"]
    workflow_diagram: "skills/omics-report/references/workflow.md"

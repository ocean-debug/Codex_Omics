schema_version: "1.0"
skills:
  omics-router:
    skill_id: "omics-router"
    layer: "system"
    domain: "infrastructure"
    backends: []
    composes: []
    public_entrypoint: true
    maturity: "validated"
    tasks: ["route_request", "inspect_input", "build_router_plan"]
    input_formats: ["prompt", "directory", "file"]
    constraints: ["plugin_local_only", "plan_only", "explainable_decision"]
    scripts:
      route: "skills/omics-router/scripts/route_omics.py"
    schemas:
      input: "skills/omics-router/schemas/input.schema.json"
      output: "skills/omics-router/schemas/output.schema.json"
      run: "skills/omics-router/schemas/run.schema.json"
    outputs: ["omics_route_plan.json"]
    approval:
      required_for_execution: false
      default_mode: "planned"
    reporting:
      manifest_required: false
      sections: ["Analysis Overview", "Input Data Summary", "Environment and Dependencies", "Methods and Parameters", "Results and QC Interpretation", "Warnings / Failures / Suggested Fixes", "Reproducibility Appendix"]
    examples: []
    router_keywords: ["route", "choose skill", "which workflow", "omics request"]
    workflow_diagram: "skills/omics-router/references/workflow.md"
  nextflow-development:
    skill_id: "nextflow-development"
    layer: "tool_family"
    domain: "multiomics"
    backends: ["nextflow", "nf-core"]
    composes: []
    public_entrypoint: true
    maturity: "validated"
    tasks: ["nfcore_workflow", "samplesheet", "nextflow_command", "approved_execution", "multiqc_summary"]
    input_formats: ["fastq", "samplesheet", "metadata_csv", "reference_fasta", "reference_gtf", "nextflow_config"]
    constraints: ["dry_run_default", "approval_required", "no_dependency_install"]
    scripts:
      check_environment: "skills/nextflow-development/scripts/check_environment.py"
      detect_data_type: "skills/nextflow-development/scripts/detect_data_type.py"
      generate_samplesheet: "skills/nextflow-development/scripts/generate_samplesheet.py"
      build_command: "skills/nextflow-development/scripts/build_nextflow_command.py"
      run: "skills/nextflow-development/scripts/run_nextflow.py"
      summarize_multiqc: "skills/nextflow-development/scripts/summarize_multiqc.py"
    schemas:
      input: "skills/nextflow-development/schemas/input.schema.json"
      output: "skills/nextflow-development/schemas/output.schema.json"
      run: "skills/nextflow-development/schemas/run.schema.json"
    outputs: ["command.sh", "params.yaml", "run_manifest.json", "report.md", "nfcore_out/"]
    approval:
      required_for_execution: true
      default_mode: "dry-run"
      approved_flag: "--approved true"
    reporting:
      manifest_required: true
      sections: ["Analysis Overview", "Input Data Summary", "Environment and Dependencies", "Methods and Parameters", "Results and QC Interpretation", "Warnings / Failures / Suggested Fixes", "Reproducibility Appendix"]
    examples: ["skills/nextflow-development/examples/minimal.json"]
    router_keywords: ["fastq", "nf-core", "nextflow", "rnaseq", "scrnaseq", "riboseq", "ribo-seq", "spatialvi", "visium", "spaceranger", "atacseq", "sarek", "translational efficiency"]
    workflow_diagram: "skills/nextflow-development/references/workflow.md"
  scvi-tools:
    skill_id: "scvi-tools"
    layer: "tool_family"
    domain: "single_cell"
    backends: ["scvi-tools", "torch"]
    composes: []
